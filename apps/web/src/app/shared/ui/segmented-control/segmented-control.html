<div class="segmented-control" role="group" [attr.aria-label]="ariaLabel()" [style.--selection-count]="items().length">
    <span
        class="selection-indicator"
        aria-hidden="true"
        [style.--selection-index]="selectedIndex()"
        [style.background]="selectedBackground()"
    ></span>
    @for (item of items(); track item.value; let index = $index) {
        <button
            #segmentButton
            type="button"
            class="segment-item"
            [class.selected]="isSelected(item)"
            [disabled]="disabled() || item.disabled"
            [attr.aria-pressed]="isSelected(item)"
            [attr.aria-label]="item.label"
            [attr.title]="item.label"
            [style.--segment-active-color]="item.activeColor ?? '#EEFFFF'"
            (click)="select(item)"
            (keydown)="moveSelection($event, index)"
        >
            @switch (item.icon) {
                @case ("keep") {
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 19 6v5c0 4.4-2.8 7.9-7 10-4.2-2.1-7-5.6-7-10V6l7-3Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="m8.5 12 2.2 2.2 4.8-4.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                }
                @case ("archive") {
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4zM3 4h18v3H3zM9 11h6" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                }
                @case ("delete") {
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14m-9 4v5m4-5v5M9 7l1-3h4l1 3m-8 0 1 13h8l1-13" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                }
                @case ("manual") {
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h8M17 7h2M5 12h2M11 12h8M5 17h11M20 17h-1" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path><circle cx="15" cy="7" r="2" fill="#242424" stroke="currentColor" stroke-width="1.7"></circle><circle cx="9" cy="12" r="2" fill="#242424" stroke="currentColor" stroke-width="1.7"></circle><circle cx="17" cy="17" r="2" fill="#242424" stroke="currentColor" stroke-width="1.7"></circle></svg>
                }
            }
        </button>
        @if (index < items().length - 1) {
            <span class="segment-divider" aria-hidden="true" [style.--divider-index]="index + 1"></span>
        }
    }
</div>
