<div class="op-shell flex">
  <op-header
    [accountChip]="wf.accountChip()"
    [accountAuthorizationState]="wf.authState()"
    [dryRunSpeedMultiplier]="wf.dryRunSpeedMultiplier()"
    [dryRunSpeedDisabled]="wf.applying() || wf.groupApplying()"
    [mutationsEnabled]="wf.mutationsEnabled()"
    [mutationToggleDisabled]="wf.mutationToggleBusy() || wf.applying() || wf.groupApplying()"
    (dryRunSpeedMultiplierChange)="wf.dryRunSpeedMultiplier.set($event)"
    (mutationsEnabledChange)="wf.setMutationsEnabled($event)"
  ></op-header>
  <main class="op-main">
    <router-outlet></router-outlet>
  </main>
</div>

<ngx-sonner-toaster position="bottom-right" closeButton></ngx-sonner-toaster>
