<div class="op-shell">
  <op-header
    [accountChip]="wf.accountChip()"
    [mutationsEnabled]="wf.mutationsEnabled()"
    [mutationToggleDisabled]="wf.mutationToggleBusy() || wf.applying() || wf.groupApplying()"
    (mutationsEnabledChange)="wf.setMutationsEnabled($event)"
  ></op-header>
  <main class="op-main">
    <router-outlet></router-outlet>
  </main>
</div>

<ngx-sonner-toaster
  theme="dark"
  position="top-center"
  [duration]="10000"
  [visibleToasts]="2"
  closeButton
  richColors
></ngx-sonner-toaster>
