<header class="op-header">
  <div class="brand-lockup">
    <img class="brand-mark" src="brand/optipass-dock.svg" alt="" aria-hidden="true">
    <div class="brand-wordmark">
      <img class="brand-logo" src="brand/optipass-text.svg" alt="Optipass">
      <div class="brand-subtitle">1Password 查重工具</div>
    </div>
  </div>
  <div class="header-spacer"></div>
  <button
    type="button"
    class="mutation-switch"
    [class.enabled]="mutationsEnabled()"
    [attr.aria-pressed]="mutationsEnabled()"
    [disabled]="mutationToggleDisabled()"
    [attr.title]="mutationsEnabled() ? '真实 1Password 变更已开启' : '真实 1Password 变更已关闭'"
    (click)="toggleMutations()"
  >
    <span class="mutation-switch-track" aria-hidden="true">
      <i></i>
    </span>
    <strong>{{ mutationsEnabled() ? '可写' : '只读' }}</strong>
  </button>
  @if (accountChip()) {
    <div class="account-chip">
      <span aria-hidden="true"></span>
      <strong>{{ accountChip() }}</strong>
    </div>
  }
</header>
