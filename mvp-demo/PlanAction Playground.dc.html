<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #212121; }
  * { box-sizing: border-box; }
  a { color: #82aaff; } a:hover { color: #89ddff; }
</style>
</helmet>
<div style="min-height: 100vh; background: #212121; color: #eeffff; font-family: 'IBM Plex Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; padding: 40px;">
  <div style="max-width: 820px; margin: 0 auto;">
    <h1 style="margin: 0 0 4px; font-size: 20px; font-weight: 700;">PlanAction 组件</h1>
    <p style="margin: 0 0 24px; font-size: 12.5px; color: #B0BEC5;">一个 PlanAction = 一组去重决策；每个 item 一行。保留 / 保留+移动 / 归档 / 删除，颜色区分</p>
    <dc-import name="PlanAction" kind="similar" site="github.com" username="dev@lin.dev" actions="{{ actions }}" hint-size="100%,380px"></dc-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      actions: [
        { action: 'keep',    title: 'GitHub',        vaultName: '个人',     url: 'github.com/login',     updated: '2026-05-12', strength: '强' },
        { action: 'move',    title: 'GitHub Work',   vaultName: '工作',     targetVault: '个人', url: 'github.com/enterprise', updated: '2026-02-08', strength: '强' },
        { action: 'archive', title: 'github.com',    vaultName: '工作',     url: 'github.com',           updated: '2024-11-03', strength: '中' },
        { action: 'archive', title: 'GitHub 备用',   vaultName: '家庭共享', url: 'github.com/sessions',  updated: '2024-05-19', strength: '中' },
        { action: 'delete',  title: 'GitHub（旧）',  vaultName: '个人',     url: 'github.com/session',   updated: '2023-02-18', strength: '中' },
        { action: 'delete',  title: 'gh 临时',       vaultName: '个人',     url: 'github.com/tmp',       updated: '2022-09-30', strength: '弱' },
        { action: 'delete',  title: 'GitHub 测试号', vaultName: '工作',     url: 'github.com/test',      updated: '2021-06-11', strength: '弱' },
        { action: 'delete',  title: 'github 老账号', vaultName: '家庭共享', url: 'github.com/old',       updated: '2020-01-04', strength: '弱' },
      ],
    };
  }
}
</script>
</body>
</html>
