<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #212121; }
  * { box-sizing: border-box; }
  a { color: #82aaff; } a:hover { color: #a4c2ff; }
</style>
</helmet>

<div style="min-height: 100vh; background: #212121; color: #eeffff; font-family: 'IBM Plex Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 48px 24px;">

  <div style="width: 420px; display: flex; flex-direction: column; gap: 18px;">
    <div style="margin-bottom: 4px;">
      <h1 style="margin: 0 0 4px; font-size: 17px; font-weight: 700;">Toast · ngx-sonner 定制</h1>
      <p style="margin: 0; font-size: 12.5px; color: #B0BEC5;">success / error / warning / info · 深色面板 + 语义色 8% 底 / 35% 描边 · headless + 内联关闭钮</p>
    </div>

    <!-- success -->
    <div data-screen-label="toast-success" style="position: relative; display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #292929; border: 1px solid rgba(195, 232, 141, 0.35); box-shadow: 0 8px 24px rgba(0,0,0,0.45); background-image: linear-gradient(rgba(195,232,141,0.08), rgba(195,232,141,0.08));">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="flex-shrink: 0;"><circle cx="10" cy="10" r="9" stroke="#c3e88d" stroke-width="1.6"></circle><path d="M6.2 10.3 L8.8 12.9 L13.8 7.4" stroke="#c3e88d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      <span style="flex: 1; font-size: 13.5px; font-weight: 600; color: #c3e88d;">已合并 3 个重复项</span>
      <button aria-label="关闭" style="flex-shrink: 0; width: 22px; height: 22px; margin-left: 2px; border: none; border-radius: 6px; background: transparent; color: #727272; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" style-hover="background: #1A1A1A; color: #c3e88d;"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg></button>
    </div>

    <!-- error -->
    <div data-screen-label="toast-error" style="position: relative; display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #292929; border: 1px solid rgba(240, 113, 120, 0.45); box-shadow: 0 8px 24px rgba(0,0,0,0.45); background-image: linear-gradient(rgba(240,113,120,0.09), rgba(240,113,120,0.09));">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="flex-shrink: 0;"><circle cx="10" cy="10" r="9" stroke="#f07178" stroke-width="1.6"></circle><path d="M10 5.6 V11" stroke="#f07178" stroke-width="1.8" stroke-linecap="round"></path><circle cx="10" cy="14" r="1.1" fill="#f07178"></circle></svg>
      <span style="flex: 1; font-size: 13.5px; font-weight: 600; color: #f07178;">合并失败：1Password 授权已过期</span>
      <button aria-label="关闭" style="flex-shrink: 0; width: 22px; height: 22px; margin-left: 2px; border: none; border-radius: 6px; background: transparent; color: #727272; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" style-hover="background: #1A1A1A; color: #f07178;"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg></button>
    </div>

    <!-- warning -->
    <div data-screen-label="toast-warning" style="position: relative; display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #292929; border: 1px solid rgba(255, 203, 107, 0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.45); background-image: linear-gradient(rgba(255,203,107,0.07), rgba(255,203,107,0.07));">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="flex-shrink: 0;"><path d="M10 2.8 L18 16.4 H2 Z" stroke="#ffcb6b" stroke-width="1.6" stroke-linejoin="round"></path><path d="M10 8 V11.6" stroke="#ffcb6b" stroke-width="1.7" stroke-linecap="round"></path><circle cx="10" cy="14" r="1" fill="#ffcb6b"></circle></svg>
      <span style="flex: 1; font-size: 13.5px; font-weight: 600; color: #ffcb6b;">该组仅剩 1 个 item，无法继续合并</span>
      <button aria-label="关闭" style="flex-shrink: 0; width: 22px; height: 22px; margin-left: 2px; border: none; border-radius: 6px; background: transparent; color: #727272; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" style-hover="background: #1A1A1A; color: #ffcb6b;"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg></button>
    </div>

    <!-- info -->
    <div data-screen-label="toast-info" style="position: relative; display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; background: #292929; border: 1px solid rgba(130, 170, 255, 0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.45); background-image: linear-gradient(rgba(130,170,255,0.08), rgba(130,170,255,0.08));">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="flex-shrink: 0;"><circle cx="10" cy="10" r="9" stroke="#82aaff" stroke-width="1.6"></circle><path d="M10 9 V14.2" stroke="#82aaff" stroke-width="1.8" stroke-linecap="round"></path><circle cx="10" cy="6" r="1.1" fill="#82aaff"></circle></svg>
      <span style="flex: 1; font-size: 13.5px; font-weight: 600; color: #82aaff;">数据仅在本机内存中处理，不会上传</span>
      <button aria-label="关闭" style="flex-shrink: 0; width: 22px; height: 22px; margin-left: 2px; border: none; border-radius: 6px; background: transparent; color: #727272; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" style-hover="background: #1A1A1A; color: #82aaff;"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg></button>
    </div>

    <div style="margin-top: 12px; border-top: 1px solid #323232; padding-top: 16px;">
      <div style="font-size: 12px; color: #727272; font-family: 'IBM Plex Mono', monospace; line-height: 1.9;">
        success #c3e88d · error #f07178<br>warning #ffcb6b · info #82aaff<br>bg #292929 + 语义色 7–9% 叠加 · 描边 35–45%
      </div>
    </div>
  </div>
</div>

</x-dc>
</body>
</html>
